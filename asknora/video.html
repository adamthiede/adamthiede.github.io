			audio.removeAttribute('src');
			audio.load();
			asrc.src=track;
			audio.load();
			console.log(asrc.src);
			var stoplink="<a href=javascript:void() onclick=removePlayer()>&#9209;<a>";
			audiotitle.innerHTML=stoplink+track;
			audio.play();
		}
		function removePlayer(){
			var audio=document.getElementById("audiocontainer");
			audio.style.display="block";
			var asrc=document.getElementById("audiosrc");
			audio.pause();
			asrc.removeAttribute('src');
			audio.removeAttribute('src');
			audio.style.display="none";
