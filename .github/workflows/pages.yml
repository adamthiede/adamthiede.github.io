---
name: deploy items
on:
  push:
    branches:
      - master
      - main
jobs:
  publish-website:
    name: deploy
    runs-on: ubuntu-latest
    steps:
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./

